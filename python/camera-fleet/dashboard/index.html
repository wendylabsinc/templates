<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Wall</title>
<style>
  :root{--bg:#0c0e12;--panel:#11141a;--line:#222834;--fg:#e7ebf0;--mut:#9aa6b2;--amber:#f5a524;--teal:#2dd4bf;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line)}
  header h1{font-size:15px;margin:0;letter-spacing:-.01em}
  #count{font-size:12px;color:var(--mut)}
  #count b{color:var(--teal)}
  .stage{flex:1;display:grid;grid-template-columns:240px 1fr;min-height:0}
  .rail{border-right:1px solid var(--line);overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
  .tile{position:relative;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#000;cursor:pointer;line-height:0}
  .tile.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .tile img{width:100%;height:auto;display:block;aspect-ratio:4/3;object-fit:cover}
  .tile .lbl{position:absolute;left:0;right:0;bottom:0;font-size:11px;line-height:1.4;padding:3px 6px;background:linear-gradient(transparent,rgba(0,0,0,.8));color:#fff;display:flex;justify-content:space-between}
  .dot{width:7px;height:7px;border-radius:50%;background:#666;display:inline-block;margin-right:5px;vertical-align:middle}
  .dot.ok{background:var(--teal)} .dot.bad{background:#ef4444}
  .main{display:flex;align-items:center;justify-content:center;padding:12px;min-width:0}
  .main img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;background:#000}
  .empty{color:var(--mut);text-align:center;font-size:14px;line-height:1.6}
  .empty code{color:var(--amber)}
</style>
</head>
<body>
  <header>
    <h1>📷 Camera Wall</h1>
    <span id="count">discovering…</span>
  </header>
  <div class="stage">
    <div class="rail" id="rail"></div>
    <div class="main" id="main">
      <div class="empty">No cameras discovered yet.<br>
        Waiting for the <code>camera</code> component to come up in the group…</div>
    </div>
  </div>

<script>
// The dashboard is fully driven by fleet discovery — there are NO camera URLs or
// ports hardcoded here. /api/peers reflects whatever the platform resolved for the
// "camera" component, live. Add/remove a device and a tile appears/disappears.
let peers = [];
let selected = null;          // peer.name
const imgs = {};              // name -> live <img> in the rail (moved into main when selected)

const streamUrl = p => p.url.replace(/\/$/, "") + "/stream";
const healthUrl = p => p.url.replace(/\/$/, "") + "/health";

async function refresh(){
  try{
    const { peers: list } = await (await fetch("/api/peers")).json();
    peers = Array.isArray(list) ? list : [];
  }catch(e){ peers = []; }
  render();
}

function render(){
  const rail = document.getElementById("rail");
  const count = document.getElementById("count");
  count.innerHTML = peers.length
    ? `<b>${peers.length}</b> camera${peers.length===1?"":"s"} discovered`
    : "no cameras discovered";

  // drop tiles for peers that vanished
  Object.keys(imgs).forEach(name => { if(!peers.find(p=>p.name===name)){ delete imgs[name]; } });

  rail.innerHTML = "";
  if(peers.length && !peers.find(p=>p.name===selected)) selected = peers[0].name;

  peers.forEach(p => {
    const tile = document.createElement("div");
    tile.className = "tile" + (p.name===selected ? " sel" : "");
    tile.onclick = () => { selected = p.name; render(); };

    let img = imgs[p.name];
    if(!img){ img = new Image(); img.src = streamUrl(p); img.alt = p.name; imgs[p.name] = img; }
    const lbl = document.createElement("div");
    lbl.className = "lbl";
    lbl.innerHTML = `<span><span class="dot ${p.status==='ready'?'ok':''}"></span>${p.name}</span>`+
                    `<span>${p.group||""}</span>`;
    tile.appendChild(img); // reuse the same <img> node so the MJPEG stream isn't reconnected on re-render
    tile.appendChild(lbl);
    rail.appendChild(tile);
  });

  const main = document.getElementById("main");
  const cur = peers.find(p=>p.name===selected);
  if(cur){
    main.innerHTML = "";
    const big = new Image();
    big.src = streamUrl(cur);
    main.appendChild(big);
  }else{
    main.innerHTML = '<div class="empty">No cameras discovered yet.<br>'+
      'Waiting for the <code>camera</code> component to come up in the group…</div>';
  }
}

refresh();
setInterval(refresh, 4000);   // pick up fleet membership changes
</script>
</body>
</html>
