<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>rc-car</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; }
    header { padding: 10px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #21262d; }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    #status { font-size: 13px; color: #8b949e; }
    #status.ok { color: #3fb950; }
    #status.err { color: #f85149; }
    main { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px; }
    #view { flex: 1 1 480px; min-width: 320px; }
    #cam, #depth { width: 100%; border-radius: 8px; background: #161b22; aspect-ratio: 4 / 3; object-fit: contain; display: block; margin-bottom: 8px; }
    #panel { flex: 0 0 260px; display: flex; flex-direction: column; gap: 14px; }
    .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    button.k { padding: 18px 0; font-size: 20px; border-radius: 8px; border: 1px solid #30363d;
               background: #21262d; color: #e6edf3; user-select: none; touch-action: none; }
    button.k:active, button.k.on { background: #1f6feb; border-color: #1f6feb; }
    #stop { padding: 16px; font-size: 18px; font-weight: 700; border-radius: 8px; border: none;
            background: #da3633; color: #fff; }
    .row { display: flex; justify-content: space-between; font-size: 13px; color: #8b949e; }
    .hint { font-size: 12px; color: #6e7681; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>rc-car teleop</h1>
    <span id="status">connecting…</span>
  </header>
  <main>
    <div id="view">
      <img id="cam" alt="color stream" />
      <img id="depth" alt="depth stream" />
    </div>
    <div id="panel">
      <div class="pad">
        <span></span>
        <button class="k" data-key="f">▲</button>
        <span></span>
        <button class="k" data-key="l">◀</button>
        <button id="stop">STOP</button>
        <button class="k" data-key="r">▶</button>
        <span></span>
        <button class="k" data-key="b">▼</button>
        <span></span>
      </div>
      <div class="row"><span>throttle</span><span id="thr">0.00</span></div>
      <div class="row"><span>steer</span><span id="str">0.00</span></div>
      <div class="row"><span>battery</span><span id="bat">—</span></div>
      <p class="hint">Drive with the buttons or <b>W A S D</b> / arrow keys.
        Commands repeat at 10&nbsp;Hz; release to coast, the on-car watchdog
        stops the car ~0.6&nbsp;s after the last command.</p>
    </div>
  </main>

  <script>
    // The camera service is host-networked on CAMERA_PORT; load its MJPEG
    // stream directly so the heavy stream never passes through the rc proxy
    // (which would starve the control endpoints on a single worker).
    const CAMERA_PORT = 8000;
    const camBase = location.protocol + "//" + location.hostname + ":" + CAMERA_PORT;
    document.getElementById("cam").src = camBase + "/stream/color";
    document.getElementById("depth").src = camBase + "/stream/depth";

    const held = new Set();
    const KEYMAP = { f: "f", b: "b", l: "l", r: "r",
      w: "f", s: "b", a: "l", d: "r",
      ArrowUp: "f", ArrowDown: "b", ArrowLeft: "l", ArrowRight: "r" };

    function vector() {
      let throttle = 0, steer = 0;
      if (held.has("f")) throttle += 1;
      if (held.has("b")) throttle -= 1;
      if (held.has("r")) steer += 1;
      if (held.has("l")) steer -= 1;
      return { throttle, steer };
    }

    let wasMoving = false;
    async function tick() {
      const v = vector();
      document.getElementById("thr").textContent = v.throttle.toFixed(2);
      document.getElementById("str").textContent = v.steer.toFixed(2);
      const moving = v.throttle !== 0 || v.steer !== 0;
      // Only POST while driving (the on-car watchdog needs the 10 Hz stream),
      // plus one final zero on release. Idle = no requests, no error spam.
      if (!moving && !wasMoving) return;
      wasMoving = moving;
      try {
        await fetch("/api/drive", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(v),
        });
      } catch (e) { /* ignore transient */ }
    }
    setInterval(tick, 100);

    async function stop() {
      held.clear();
      document.querySelectorAll("button.k").forEach((b) => b.classList.remove("on"));
      try { await fetch("/api/stop", { method: "POST" }); } catch (e) {}
    }
    document.getElementById("stop").addEventListener("click", stop);

    function press(dir, on) {
      if (on) held.add(dir); else held.delete(dir);
      document.querySelectorAll('button.k[data-key="' + dir + '"]').forEach((b) => b.classList.toggle("on", on));
    }

    document.querySelectorAll("button.k").forEach((btn) => {
      const dir = btn.dataset.key;
      const down = (e) => { e.preventDefault(); press(dir, true); };
      const up = (e) => { e.preventDefault(); press(dir, false); };
      btn.addEventListener("pointerdown", down);
      btn.addEventListener("pointerup", up);
      btn.addEventListener("pointerleave", up);
      btn.addEventListener("pointercancel", up);
    });

    window.addEventListener("keydown", (e) => {
      const dir = KEYMAP[e.key];
      if (dir) { e.preventDefault(); press(dir, true); }
      if (e.key === " ") stop();
    });
    window.addEventListener("keyup", (e) => {
      const dir = KEYMAP[e.key];
      if (dir) { e.preventDefault(); press(dir, false); }
    });

    async function poll() {
      const s = document.getElementById("status");
      try {
        const r = await fetch("/api/health");
        const h = await r.json();
        if (h.connected) {
          s.textContent = "board connected" + (h.version ? " · fw " + h.version : "");
          s.className = "ok";
          document.getElementById("bat").textContent =
            (h.battery_voltage != null ? h.battery_voltage.toFixed(1) + " V" : "—");
        } else {
          s.textContent = "board not reachable";
          s.className = "err";
        }
      } catch (e) {
        s.textContent = "ui offline";
        s.className = "err";
      }
    }
    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
